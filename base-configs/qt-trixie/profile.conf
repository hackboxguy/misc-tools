# qt-trixie base profile: same recipe as qt-common but for RaspiOS *trixie*
# (Debian 13) vanilla images. Package names verified against the trixie index
# (Qt5 dev stack still present; boost runtime is 1.83 instead of bookworm's
# 1.74).
#
# Boards opting in must ALL switch together:
#   BASE_PROFILE=qt-trixie
#   IMAGE_URL="https://downloads.raspberrypi.com/raspios_lite_arm64/images/raspios_lite_arm64-2026-06-19/2026-06-18-raspios-trixie-arm64-lite.img.xz"
# and boards with their own runtime-deps boost pins need 1.83 there too.
# Kernel boards (micropanel, pi4-touch-demo): revalidate KERNEL_BRANCH/
# KERNEL_CONFIG against the trixie image's kernel generation before switching.
EXTEND_SIZE_MB=3200
DEFAULT_PASSWORD=brb0x
