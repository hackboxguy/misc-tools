# micropanel board configuration for ../../build-image.sh
BOARD_DESCRIPTION="Micropanel display-test system (Qt demo, FPGA tools, disptool, kodi)"

# Vanilla RaspiOS lite image (bookworm, arm64)
IMAGE_URL="https://downloads.raspberrypi.com/raspios_oldstable_lite_arm64/images/raspios_oldstable_lite_arm64-2025-10-02/2025-10-01-raspios-bookworm-arm64-lite.img.xz"
IMAGE_SHA256=""

# Base stage comes from the shared qt-bookworm profile (base-configs/qt-bookworm):
# apt packages + vsomeip baked into one base image reused by all Qt boards.
# Extend size and password are profile properties.
BASE_PROFILE=qt-bookworm

DEFAULT_VERSION=01.15

# Extra image extension applied at the START of the apps stage (working copy
# only - the shared profile base and kernel caches stay compact). Needed
# because micropanel's hook set (sp6bins/media-files copies + 4 source
# builds) requires ~1.5-2GB scratch, and the profile base + kernel leave
# only ~0.6GB free. Final image grows accordingly (~+1.2GB; keeps the result under 8GB-card capacity).
APPS_EXTEND_SIZE_MB=1200

# Files relative to this directory ("none" to disable).
# RUNTIME_DEPS is re-asserted in the apps stage after the build-dep purge;
# BUILD_DEPS is unused while BASE_PROFILE is set (profile build-deps rule).
RUNTIME_DEPS=runtime-deps.txt
BUILD_DEPS=build-deps.txt
HOOK_LIST=hooks.txt

# Kernel + out-of-tree drivers (hh983-serializer, himax-touch from br-wrapper)
KERNEL=1
KERNEL_BRANCH=rpi-6.12.y
KERNEL_CONFIG=custom-pi-kernel-builder/configs/config-6.12.47+rpt-rpi-v8
DRIVERS_DIR=br-wrapper/package

# Repos cloned/updated into <workspace>/sources before building.
# Format: name|git-url|branch  (one per line)
# ${REPOBINS} in hooks.txt resolves to the sources dir (or --repobins=DIR).
SOURCES="br-wrapper|https://github.com/hackboxguy/br-wrapper.git|main
sp6bins|https://github.com/hackboxguy/sp6bins.git|main
archsp6|https://github.com/hackboxguy/space6-architecture.git|master
media-files|https://github.com/hackboxguy/media-files.git|main"
