# media-mux board configuration for ../../build-image.sh
BOARD_DESCRIPTION="Media multiplexer (DLNA); variants: extern-dlna, selfhosted-dlna"

IMAGE_URL="https://downloads.raspberrypi.com/raspios_oldstable_arm64/images/raspios_oldstable_arm64-2025-10-02/2025-10-01-raspios-bookworm-arm64-lite.img.xz"
IMAGE_SHA256=""

EXTEND_SIZE_MB=1000
DEFAULT_PASSWORD=brb0x
DEFAULT_VERSION=01.00

# Default variant: build media-mux from source, external DLNA server
RUNTIME_DEPS=media-mux-runtime-deps.txt
BUILD_DEPS=media-mux-build-deps.txt
HOOK_LIST=media-mux-packages.txt

# Variant: pre-compiled binaries + external DLNA (no build tools in image)
RUNTIME_DEPS_extern_dlna=media-mux-runtime-deps-minimal.txt
BUILD_DEPS_extern_dlna=none
HOOK_LIST_extern_dlna=media-mux-packages-extern-dlna.txt

# Variant: pre-compiled binaries + self-hosted DLNA/DHCP/NTP
RUNTIME_DEPS_selfhosted_dlna=media-mux-runtime-deps-minimal.txt
BUILD_DEPS_selfhosted_dlna=none
HOOK_LIST_selfhosted_dlna=media-mux-packages-selfhosted-dlna.txt

# No custom kernel drivers for this board
KERNEL=0

SOURCES=""
