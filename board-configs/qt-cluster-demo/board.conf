# qt-cluster-demo board configuration for ../../build-image.sh
BOARD_DESCRIPTION="Qt automotive instrument cluster demo (FocusDrive DMS, demo mode)"

IMAGE_URL="https://downloads.raspberrypi.com/raspios_oldstable_lite_arm64/images/raspios_oldstable_lite_arm64-2025-10-02/2025-10-01-raspios-bookworm-arm64-lite.img.xz"
IMAGE_SHA256=""

# Base stage comes from the shared qt-bookworm profile (apt packages + vsomeip
# baked in); extend size and password are profile properties.
BASE_PROFILE=qt-bookworm

DEFAULT_VERSION=01.00

# Runtime deps re-asserted after the apps-stage build-dep purge.
# The boost runtime pins are OS-release-specific, so the qt-trixie profile
# gets its own list (selected automatically with --base-profile=qt-trixie).
RUNTIME_DEPS=runtime-deps.txt
RUNTIME_DEPS_qt_trixie=runtime-deps-trixie.txt
# Build deps are profile-owned when BASE_PROFILE is set.
BUILD_DEPS=none
HOOK_LIST=hooks.txt

# Stock RaspiOS kernel is sufficient - no custom drivers.
KERNEL=0

# qt-cluster-demo is a PRIVATE repo: cloned host-side (invoking user's git
# credentials apply) and fed to the hook as a file:// local source - an
# in-chroot git clone would prompt for credentials and hang unattended
# builds.
SOURCES="qt-cluster-demo|https://github.com/hackboxguy/qt-cluster-demo.git|main"
