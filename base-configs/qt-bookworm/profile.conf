# qt-bookworm base profile: shared base image for Qt-based boards
# (micropanel, pi4-touch-demo, qt-cluster-demo).
#
# The profile owns the base-stage parameters; boards referencing it via
# BASE_PROFILE=qt-bookworm share one cached base image in
# <workspace>/base/profile-qt-bookworm/.
EXTEND_SIZE_MB=3200
DEFAULT_PASSWORD=brb0x

# Profile-pinned vanilla image (bookworm): overrides the board's IMAGE_URL so
# all boards of this profile build from the same OS release. CLI --image-url
# still wins over this.
IMAGE_URL="https://downloads.raspberrypi.com/raspios_oldstable_lite_arm64/images/raspios_oldstable_lite_arm64-2025-10-02/2025-10-01-raspios-bookworm-arm64-lite.img.xz"
