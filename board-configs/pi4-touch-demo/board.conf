# pi4-touch-demo board configuration for ../../build-image.sh
BOARD_DESCRIPTION="Pi4 touch-display demo (micropanel + qt-demo-launcher, FPDLink drivers)"

IMAGE_URL="https://downloads.raspberrypi.com/raspios_oldstable_lite_arm64/images/raspios_oldstable_lite_arm64-2025-10-02/2025-10-01-raspios-bookworm-arm64-lite.img.xz"
IMAGE_SHA256=""

# Base stage comes from the shared qt-bookworm profile (base-configs/qt-bookworm);
# extend size and password are profile properties.
BASE_PROFILE=qt-bookworm

DEFAULT_VERSION=01.03

# Extra apps-stage extension (working copy only) - same heavy micropanel-
# style hook set as the micropanel board; see that board.conf for details.
APPS_EXTEND_SIZE_MB=1200

# RUNTIME_DEPS is re-asserted in the apps stage after the build-dep purge;
# BUILD_DEPS is unused while BASE_PROFILE is set (profile build-deps rule).
RUNTIME_DEPS=pi4-touch-demo-runtime-deps.txt
BUILD_DEPS=pi4-touch-demo-build-deps.txt
HOOK_LIST=pi4-touch-demo-packages.txt

KERNEL=1
KERNEL_BRANCH=rpi-6.12.y
KERNEL_CONFIG=custom-pi-kernel-builder/configs/config-6.12.47+rpt-rpi-v8
DRIVERS_DIR=br-wrapper/package

SOURCES="br-wrapper|https://github.com/hackboxguy/br-wrapper.git|main
sp6bins|https://github.com/hackboxguy/sp6bins.git|main
archsp6|https://github.com/hackboxguy/space6-architecture.git|master
media-files|https://github.com/hackboxguy/media-files.git|main"
